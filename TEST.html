<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PASTEL MATH PRINCESS v0.3t</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 50%, #e0c3fc 100%);
            font-family: 'Kanit', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #5d4037;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🌸 SOFT PASTEL BUBBLES CANVAS */
        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            filter: blur(8px);
            opacity: 0.8;
        }

        /* 🎀 MAIN CONTAINER */
        .game-wrapper {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(12px) brightness(1.05);
            background: rgba(255, 255, 255, 0.35);
        }

        /* HEADER & TIMER BAR */
        .header-bar {
            width: 100%;
            max-width: 750px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            border: 3px solid #ff85a2;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.3);
            border-radius: 25px;
            padding: 12px 28px;
        }
        .score-box {
            font-size: 24px;
            font-weight: 800;
            color: #ff5277;
            text-shadow: 1px 1px 0px #fff;
        }
        .level-badge {
            font-size: 14px;
            font-weight: 700;
            background: #ffe3e8;
            color: #ff4081;
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid #ff85a2;
        }
        .timer-box {
            font-size: 26px;
            font-weight: 800;
            color: #7c4dff;
        }

        .timer-bar-container {
            width: 100%;
            max-width: 750px;
            height: 12px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            border: 2px solid #ffb7c5;
        }
        .timer-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff85a2, #b57edc);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        /* 💖 QUESTION CARD */
        .question-card {
            width: 100%;
            max-width: 750px;
            flex: 1;
            margin: 18px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid #ff9ebb;
            box-shadow: 0 15px 35px rgba(255, 158, 187, 0.35);
            border-radius: 35px;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .question-text {
            font-size: clamp(30px, 5.5vw, 52px);
            font-weight: 800;
            color: #4a2c40;
            text-shadow: 2px 2px 0px #ffe3e8;
        }

        /* 🍬 ANSWERS GRID */
        .answers-grid {
            width: 100%;
            max-width: 750px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 10px;
        }
        .btn-answer {
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #b57edc;
            border-radius: 22px;
            color: #5c2c6d;
            font-size: clamp(22px, 4vw, 36px);
            font-weight: 800;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(181, 126, 220, 0.25);
        }
        .btn-answer:hover, .btn-answer:active {
            background: #ff85a2;
            color: #ffffff;
            border-color: #ff5277;
            box-shadow: 0 12px 25px rgba(255, 82, 119, 0.4);
            transform: translateY(-4px) scale(1.02);
        }

        /* 🍓 OVERLAY SCREENS */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(255, 240, 245, 0.94);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
        }
        .overlay-title {
            font-size: clamp(34px, 7vw, 64px);
            font-weight: 900;
            color: #ff4081;
            text-shadow: 3px 3px 0px #ffe3e8;
            margin-bottom: 8px;
        }
        .overlay-subtitle {
            font-size: 20px;
            font-weight: 700;
            color: #7c4dff;
            background: #ffffff;
            padding: 6px 20px;
            border-radius: 20px;
            border: 2px dashed #b57edc;
            margin-bottom: 20px;
        }
        .overlay-desc {
            font-size: 18px;
            color: #6a4c6a;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-start {
            background: linear-gradient(135deg, #ff85a2, #b57edc);
            border: 3px solid #ffffff;
            border-radius: 50px;
            color: #fff;
            font-size: 26px;
            font-weight: 800;
            padding: 16px 52px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-start:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.7);
        }

        /* 👑 SINGLE CREDIT */
        .credit-footer {
            font-size: 14px;
            font-weight: 700;
            color: #8e6c88;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <!-- Cute Pastel Canvas -->
    <canvas id="bgCanvas"></canvas>

    <!-- Main Game UI -->
    <div class="game-wrapper">
        <div style="width: 100%; max-width: 750px; display: flex; flex-direction: column; align-items: center;">
            <div class="header-bar">
                <div class="score-box" id="scoreDisplay">คะแนน: 0</div>
                <div class="level-badge">คณิตศาสตร์ระดับ ม.ต้น</div>
                <div class="timer-box" id="timerDisplay">30.0s</div>
            </div>
            <div class="timer-bar-container">
                <div class="timer-bar-fill" id="timerBar"></div>
            </div>
        </div>

        <div class="question-card">
            <div class="question-text" id="questionDisplay">พร้อมหรือยังคะ?</div>
        </div>

        <div class="answers-grid" id="answersGrid">
            <button class="btn-answer">🌸</button>
            <button class="btn-answer">🎀</button>
            <button class="btn-answer">✨</button>
            <button class="btn-answer">🍭</button>
        </div>

        <!-- Single Credit Tag -->
        <div class="credit-footer">By Shogun v0.3t</div>
    </div>

    <!-- Start / Game Over Overlay -->
    <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlayTitle">🌸 MATH PRINCESS 🌸</div>
        <div class="overlay-subtitle">คณิตศาสตร์ระดับ ม.ต้น</div>
        <div class="overlay-desc" id="overlayDesc">
            ตอบคำถามตัวเลขวิชาคณิตศาสตร์ ม.ต้น<br>
            เวลาคิดข้อละ 30 วินาที | ตอบผิดกดเริ่มใหม่ทันทีน้า~
        </div>
        <button class="btn-start" id="startBtn" onclick="startGame()">เริ่มเลย!</button>
    </div>

    <script>
        // ==========================================
        // 🔊 CUTE SOUND ENGINE (Web Audio API)
        // ==========================================
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'correct') {
                    // Cute Chime Sound
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(587.33, now); // D5
                    osc.frequency.setValueAtTime(880, now + 0.1); // A5
                    gain.gain.setValueAtTime(0.18, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                } else if (type === 'wrong') {
                    // Cute Oops Sound
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(220, now);
                    osc.frequency.exponentialRampToValueAtTime(110, now + 0.25);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                }
            } catch(e) {}
        }

        // ==========================================
        // 🌸 PASTEL BUBBLES CANVAS BACKGROUND
        // ==========================================
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let bubbles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            bubbles = [];
            const colors = ['#ff85a2', '#b57edc', '#7c4dff', '#ffc3a0', '#90e0ef'];
            for(let i=0; i<40; i++) {
                bubbles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 25 + 10,
                    speed: Math.random() * 1.5 + 0.5,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function renderBG() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            bubbles.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = b.color;
                ctx.fill();

                b.y -= b.speed;
                if (b.y + b.radius < 0) {
                    b.y = canvas.height + b.radius;
                    b.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(renderBG);
        }
        renderBG();

        // ==========================================
        // 🧠 MATH GENERATOR (ระดับ ม.ต้น)
        // ==========================================
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateMathQuestion() {
            const types = ['signed', 'algebra', 'exponent', 'combined', 'arithmetic'];
            const type = types[Math.floor(Math.random() * types.length)];
            let question = '', answer = 0;

            if (type === 'signed') {
                // จำนวนเต็มบวก-ลบ (ม.ต้น)
                const op = ['+', '-', '*'][Math.floor(Math.random() * 3)];
                let a = randInt(-20, 20); if (a === 0) a = 6;
                let b = randInt(-20, 20); if (b === 0) b = -4;
                if (op === '+') { question = `(${a}) + (${b})`; answer = a + b; }
                else if (op === '-') { question = `(${a}) - (${b})`; answer = a - b; }
                else { question = `(${a}) × (${b})`; answer = a * b; }
            } else if (type === 'algebra') {
                // สมการเชิงเส้นตัวแปรเดียว (ม.ต้น)
                let x = randInt(-10, 15); if (x === 0) x = 3;
                let a = randInt(2, 6);
                let b = randInt(2, 20);
                let res = a * x + b;
                question = `หาค่า x: ${a}x + ${b} = ${res}`;
                answer = x;
            } else if (type === 'exponent') {
                // เลขยกกำลัง (ม.ต้น)
                let base = randInt(8, 15);
                let sub = randInt(10, 50);
                question = `${base}² - ${sub}`;
                answer = (base * base) - sub;
            } else if (type === 'combined') {
                // บวกลบคูณหารระคน (ม.ต้น)
                let a = randInt(5, 12), b = randInt(4, 10), c = randInt(10, 50);
                if (Math.random() > 0.5) {
                    question = `(${a} × ${b}) - ${c}`;
                    answer = (a * b) - c;
                } else {
                    question = `${c} + (${a} × ${b})`;
                    answer = c + (a * b);
                }
            } else {
                // บวก ลบ คูณ หาร ทั่วไป
                const op = ['+', '-', '*', '/'][Math.floor(Math.random() * 4)];
                if (op === '+') {
                    let a = randInt(30, 150), b = randInt(20, 120);
                    question = `${a} + ${b}`; answer = a + b;
                } else if (op === '-') {
                    let a = randInt(50, 200), b = randInt(20, 100);
                    question = `${a} - ${b}`; answer = a - b;
                } else if (op === '*') {
                    let a = randInt(7, 18), b = randInt(6, 15);
                    question = `${a} × ${b}`; answer = a * b;
                } else {
                    let b = randInt(5, 15), ans = randInt(5, 20);
                    let a = b * ans;
                    question = `${a} ÷ ${b}`; answer = ans;
                }
            }

            // สุ่มสอยตัวเลือก 4 ข้อ
            let choices = [answer];
            while (choices.length < 4) {
                let offset = randInt(1, 5) * (Math.random() < 0.5 ? 1 : -1);
                let wrong = answer + offset;
                if (!choices.includes(wrong)) choices.push(wrong);
            }
            choices.sort(() => Math.random() - 0.5);

            return { question, answer, choices };
        }

        // ==========================================
        // 🎮 GAME LOGIC
        // ==========================================
        let score = 0;
        let currentAnswer = 0;
        let timer = 30.0;
        let timerInterval = null;
        let isPlaying = false;

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            score = 0;
            isPlaying = true;
            document.getElementById('scoreDisplay').innerText = `คะแนน: ${score}`;
            nextQuestion();
        }

        function nextQuestion() {
            if (!isPlaying) return;

            const q = generateMathQuestion();
            currentAnswer = q.answer;
            document.getElementById('questionDisplay').innerText = q.question;

            const buttons = document.querySelectorAll('.btn-answer');
            buttons.forEach((btn, idx) => {
                btn.innerText = q.choices[idx];
                btn.onclick = () => checkAnswer(q.choices[idx]);
            });

            // Reset 30s Timer
            clearInterval(timerInterval);
            timer = 30.0;
            updateTimerUI();

            const startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timer = Math.max(0, 30.0 - elapsed);
                updateTimerUI();

                if (timer <= 0) {
                    gameOver('หมดเวลา 30 วินาทีแล้วน้า~');
                }
            }, 50);
        }

        function updateTimerUI() {
            document.getElementById('timerDisplay').innerText = `${timer.toFixed(1)}s`;
            const percent = (timer / 30.0) * 100;
            document.getElementById('timerBar').style.width = `${percent}%`;
        }

        function checkAnswer(selected) {
            if (!isPlaying) return;

            if (selected === currentAnswer) {
                playSound('correct');
                score += 1;
                document.getElementById('scoreDisplay').innerText = `คะแนน: ${score}`;
                nextQuestion();
            } else {
                gameOver(`ตอบผิดน้า~ คำตอบที่ถูกคือ ${currentAnswer}`);
            }
        }

        function gameOver(reason) {
            isPlaying = false;
            clearInterval(timerInterval);
            playSound('wrong');

            document.getElementById('overlayTitle').innerText = 'GAME OVER';
            document.getElementById('overlayDesc').innerHTML = `${reason}<br><br><span style="color:#ff4081; font-size:26px; font-weight:800;">ทำได้ทั้งหมด: ${score} คะแนน</span>`;
            document.getElementById('startBtn').innerText = 'ลองใหม่อีกครั้ง';
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
