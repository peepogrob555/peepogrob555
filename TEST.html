<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAKURA MATH PRINCESS v0.3t</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800;900&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ffeef2 0%, #ffc3a0 40%, #ffa6c9 70%, #ffdde1 100%);
            font-family: 'Kanit', sans-serif;
            color: #4a2e35;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🌸 SAKURA & PARTICLE CANVAS */
        #sakuraCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* 💖 MAIN GAME CONTAINER */
        .game-wrapper {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            backdrop-filter: blur(14px) brightness(1.02);
            background: rgba(255, 240, 245, 0.4);
            border: 4px solid rgba(255, 183, 197, 0.6);
            box-shadow: inset 0 0 80px rgba(255, 105, 180, 0.15);
        }

        /* 👑 HEADER BAR */
        .header-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.88);
            border: 3px solid #ff85a2;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.35), inset 0 0 15px rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 10px 24px;
            animation: floatHeader 4s ease-in-out infinite alternate;
        }
        @keyframes floatHeader {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-4px); }
        }

        .score-box {
            font-size: 24px;
            font-weight: 800;
            color: #ff3366;
            text-shadow: 2px 2px 0px #ffe6ed;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .level-badge {
            font-size: 14px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: #ffffff;
            padding: 6px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 12px rgba(255, 117, 140, 0.4);
            letter-spacing: 0.5px;
        }
        .timer-box {
            font-size: 26px;
            font-weight: 900;
            color: #ff1493;
            text-shadow: 0 0 10px rgba(255, 20, 147, 0.3);
        }

        /* ⏳ TIMER BAR */
        .timer-bar-container {
            width: 100%;
            max-width: 800px;
            height: 14px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            margin-top: 10px;
            overflow: hidden;
            border: 2.5px solid #ffb7c5;
            box-shadow: 0 4px 10px rgba(255, 183, 197, 0.3);
        }
        .timer-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff85a2, #ff3366, #ff1493);
            border-radius: 10px;
            transition: width 0.1s linear;
            box-shadow: 0 0 12px #ff3366;
        }

        /* 🌸 QUESTION CARD */
        .question-card {
            width: 100%;
            max-width: 800px;
            flex: 1;
            margin: 16px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.92);
            border: 4px solid #ff69b4;
            box-shadow: 0 20px 45px rgba(255, 105, 180, 0.35), inset 0 0 25px rgba(255, 255, 255, 0.8);
            border-radius: 38px;
            padding: 24px;
            text-align: center;
            position: relative;
        }
        .question-card::before {
            content: '🌸 ✨ 🌸';
            position: absolute;
            top: -16px;
            background: #ffffff;
            padding: 2px 18px;
            border-radius: 15px;
            border: 2px solid #ff69b4;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.2);
        }
        .question-text {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 900;
            color: #3a1c24;
            text-shadow: 2px 3px 0px #ffd1dc;
            line-height: 1.3;
        }

        /* 🍧 ANSWERS GRID */
        .answers-grid {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 8px;
        }
        .btn-answer {
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #ff85a2;
            border-radius: 26px;
            color: #4a2e35;
            font-size: clamp(22px, 4.5vw, 38px);
            font-weight: 900;
            padding: 18px;
            cursor: pointer;
            transition: all 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 22px rgba(255, 133, 162, 0.28);
            position: relative;
            overflow: hidden;
        }
        .btn-answer:hover, .btn-answer:active {
            background: linear-gradient(135deg, #ff85a2, #ff3366);
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 15px 30px rgba(255, 51, 102, 0.5);
            transform: translateY(-5px) scale(1.03);
        }

        /* 🌸 OVERLAY SCREENS */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(255, 240, 245, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
        }
        .overlay-title {
            font-size: clamp(38px, 8vw, 70px);
            font-weight: 900;
            color: #ff1493;
            text-shadow: 3px 3px 0px #ffe6ed, 0 0 25px rgba(255, 20, 147, 0.3);
            margin-bottom: 6px;
        }
        .overlay-subtitle {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            padding: 8px 24px;
            border-radius: 25px;
            box-shadow: 0 6px 18px rgba(255, 117, 140, 0.35);
            margin-bottom: 22px;
        }
        .overlay-desc {
            font-size: 19px;
            color: #5c3a42;
            margin-bottom: 32px;
            line-height: 1.7;
            font-weight: 600;
        }
        .btn-start {
            background: linear-gradient(135deg, #ff1493, #ff65a3);
            border: 4px solid #ffffff;
            border-radius: 50px;
            color: #fff;
            font-size: 28px;
            font-weight: 900;
            padding: 18px 56px;
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(255, 20, 147, 0.5);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-start:hover {
            transform: scale(1.08);
            box-shadow: 0 18px 45px rgba(255, 20, 147, 0.7);
        }

        /* 👑 FOOTER CREDIT */
        .credit-footer {
            font-size: 14px;
            font-weight: 800;
            color: #a36b77;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 16px;
            border-radius: 15px;
            border: 1px solid rgba(255, 183, 197, 0.5);
        }
    </style>
</head>
<body>

    <!-- Sakura & Explosion Particles Canvas -->
    <canvas id="sakuraCanvas"></canvas>

    <!-- Main Game UI -->
    <div class="game-wrapper">
        <div style="width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center;">
            <div class="header-bar">
                <div class="score-box" id="scoreDisplay">🌸 คะแนน: 0</div>
                <div class="level-badge">คณิตศาสตร์ระดับ ม.ต้น</div>
                <div class="timer-box" id="timerDisplay">45.0s</div>
            </div>
            <div class="timer-bar-container">
                <div class="timer-bar-fill" id="timerBar"></div>
            </div>
        </div>

        <div class="question-card">
            <div class="question-text" id="questionDisplay">พร้อมท้าทายความเร็วหรือยังคะ? 🌸</div>
        </div>

        <div class="answers-grid" id="answersGrid">
            <button class="btn-answer">🌸</button>
            <button class="btn-answer">🎀</button>
            <button class="btn-answer">✨</button>
            <button class="btn-answer">🍡</button>
        </div>

        <!-- Single Credit Tag -->
        <div class="credit-footer">By Shogun v0.3t</div>
    </div>

    <!-- Start / Game Over Overlay -->
    <div class="overlay" id="overlay">
        <div class="overlay-title">SAKURA MATH 🌸</div>
        <div class="overlay-subtitle">คณิตศาสตร์ระดับ ม.ต้น</div>
        <div class="overlay-desc" id="overlayDesc">
            คิดคำนวณโจทย์คณิต ม.ต้น ในบรรยากาศซากุระแสนหวาน<br>
            ⏱️ เวลาคิดข้อละ <b>45 วินาที</b> | ตอบผิด/หมดเวลา เริ่มใหม่ทันที!
        </div>
        <button class="btn-start" id="startBtn" onclick="startGame()">ลุยเลยเจ้าหญิง! ✨</button>
    </div>

    <script>
        // ==========================================
        // 🔊 AUDIO ENGINE (Web Audio API)
        // ==========================================
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(659.25, now); // E5
                    osc.frequency.setValueAtTime(987.77, now + 0.1); // B5
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(260, now);
                    osc.frequency.exponentialRampToValueAtTime(130, now + 0.28);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.28);
                    osc.start(now); osc.stop(now + 0.28);
                }
            } catch(e) {}
        }

        // ==========================================
        // 🌸 SAKURA PHYSICS & PARTICLE SYSTEM
        // ==========================================
        const canvas = document.getElementById('sakuraCanvas');
        const ctx = canvas.getContext('2d');
        let petals = [];
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            petals = [];
            for (let i = 0; i < 45; i++) {
                petals.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 10 + 8,
                    speedY: Math.random() * 1.5 + 0.8,
                    speedX: Math.random() * 1 - 0.5,
                    angle: Math.random() * 360,
                    spin: Math.random() * 2 - 1,
                    swing: Math.random() * Math.PI * 2
                });
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawSakuraPetal(x, y, size, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate((angle * Math.PI) / 180);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-size, -size * 1.5, -size * 1.5, size / 2, 0, size * 1.5);
            ctx.bezierCurveTo(size * 1.5, size / 2, size, -size * 1.5, 0, 0);
            ctx.fillStyle = '#ffb7c5';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ff69b4';
            ctx.fill();
            ctx.restore();
        }

        function triggerBurst(x, y) {
            const colors = ['#ff1493', '#ff69b4', '#ffb7c5', '#ffffff', '#ffe6ed'];
            for (let i = 0; i < 35; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1,
                    rotation: Math.random() * 360
                });
            }
        }

        function renderCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Falling Petals
            petals.forEach(p => {
                p.swing += 0.02;
                p.x += Math.sin(p.swing) * 1.2 + p.speedX;
                p.y += p.speedY;
                p.angle += p.spin;

                drawSakuraPetal(p.x, p.y, p.size, p.angle);

                if (p.y > canvas.height + 20) {
                    p.y = -20;
                    p.x = Math.random() * canvas.width;
                }
            });

            // Burst Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i];
                pt.x += pt.vx;
                pt.y += pt.vy;
                pt.vy += 0.15; // Gravity
                pt.alpha -= 0.025;

                ctx.save();
                ctx.globalAlpha = Math.max(0, pt.alpha);
                drawSakuraPetal(pt.x, pt.y, pt.size, pt.rotation);
                ctx.restore();

                if (pt.alpha <= 0) particles.splice(i, 1);
            }

            requestAnimationFrame(renderCanvas);
        }
        renderCanvas();

        // ==========================================
        // 🧠 MATH GENERATOR (คณิตศาสตร์ระดับ ม.ต้น)
        // ==========================================
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateMathQuestion() {
            const types = ['signed', 'algebra', 'exponent', 'combined', 'arithmetic'];
            const type = types[Math.floor(Math.random() * types.length)];
            let question = '', answer = 0;

            if (type === 'signed') {
                // จำนวนเต็มบวก-ลบ (ม.ต้น)
                const op = ['+', '-', '*'][Math.floor(Math.random() * 3)];
                let a = randInt(-25, 25); if (a === 0) a = 8;
                let b = randInt(-25, 25); if (b === 0) b = -6;
                if (op === '+') { question = `(${a}) + (${b})`; answer = a + b; }
                else if (op === '-') { question = `(${a}) - (${b})`; answer = a - b; }
                else { question = `(${a}) × (${b})`; answer = a * b; }
            } else if (type === 'algebra') {
                // สมการเชิงเส้นตัวแปรเดียว (ม.ต้น)
                let x = randInt(-12, 18); if (x === 0) x = 5;
                let a = randInt(2, 7);
                let b = randInt(2, 25);
                let res = a * x + b;
                question = `หาค่า x: ${a}x + ${b} = ${res}`;
                answer = x;
            } else if (type === 'exponent') {
                // เลขยกกำลัง (ม.ต้น)
                let base = randInt(8, 16);
                let sub = randInt(10, 60);
                question = `${base}² - ${sub}`;
                answer = (base * base) - sub;
            } else if (type === 'combined') {
                // บวกลบคูณหารระคน (ม.ต้น)
                let a = randInt(6, 14), b = randInt(4, 12), c = randInt(12, 60);
                if (Math.random() > 0.5) {
                    question = `(${a} × ${b}) - ${c}`;
                    answer = (a * b) - c;
                } else {
                    question = `${c} + (${a} × ${b})`;
                    answer = c + (a * b);
                }
            } else {
                // บวก ลบ คูณ หาร ทั่วไป
                const op = ['+', '-', '*', '/'][Math.floor(Math.random() * 4)];
                if (op === '+') {
                    let a = randInt(40, 180), b = randInt(30, 140);
                    question = `${a} + ${b}`; answer = a + b;
                } else if (op === '-') {
                    let a = randInt(60, 220), b = randInt(30, 120);
                    question = `${a} - ${b}`; answer = a - b;
                } else if (op === '*') {
                    let a = randInt(8, 19), b = randInt(6, 16);
                    question = `${a} × ${b}`; answer = a * b;
                } else {
                    let b = randInt(6, 16), ans = randInt(6, 24);
                    let a = b * ans;
                    question = `${a} ÷ ${b}`; answer = ans;
                }
            }

            // สุ่มตัวเลือก 4 ข้อ
            let choices = [answer];
            while (choices.length < 4) {
                let offset = randInt(1, 6) * (Math.random() < 0.5 ? 1 : -1);
                let wrong = answer + offset;
                if (!choices.includes(wrong)) choices.push(wrong);
            }
            choices.sort(() => Math.random() - 0.5);

            return { question, answer, choices };
        }

        // ==========================================
        // 🎮 GAME LOGIC (45 Seconds)
        // ==========================================
        let score = 0;
        let currentAnswer = 0;
        const maxTime = 45.0; // 45 วิ
        let timer = maxTime;
        let timerInterval = null;
        let isPlaying = false;

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            score = 0;
            isPlaying = true;
            document.getElementById('scoreDisplay').innerText = `🌸 คะแนน: ${score}`;
            nextQuestion();
        }

        function nextQuestion() {
            if (!isPlaying) return;

            const q = generateMathQuestion();
            currentAnswer = q.answer;
            document.getElementById('questionDisplay').innerText = q.question;

            const buttons = document.querySelectorAll('.btn-answer');
            buttons.forEach((btn, idx) => {
                btn.innerText = q.choices[idx];
                btn.onclick = (e) => checkAnswer(q.choices[idx], e);
            });

            // Reset 45s Timer
            clearInterval(timerInterval);
            timer = maxTime;
            updateTimerUI();

            const startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timer = Math.max(0, maxTime - elapsed);
                updateTimerUI();

                if (timer <= 0) {
                    gameOver('หมดเวลา 45 วินาทีแล้วน้า~ 🌸');
                }
            }, 50);
        }

        function updateTimerUI() {
            document.getElementById('timerDisplay').innerText = `${timer.toFixed(1)}s`;
            const percent = (timer / maxTime) * 100;
            document.getElementById('timerBar').style.width = `${percent}%`;
        }

        function checkAnswer(selected, event) {
            if (!isPlaying) return;

            if (selected === currentAnswer) {
                playSound('correct');
                score += 1;
                document.getElementById('scoreDisplay').innerText = `🌸 คะแนน: ${score}`;
                
                // Burst Particle Effect on Button Click
                if (event) {
                    const rect = event.target.getBoundingClientRect();
                    triggerBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
                }

                nextQuestion();
            } else {
                gameOver(`ตอบผิดน้า~ คำตอบที่ถูกคือ ${currentAnswer}`);
            }
        }

        function gameOver(reason) {
            isPlaying = false;
            clearInterval(timerInterval);
            playSound('wrong');

            document.getElementById('overlayDesc').innerHTML = `${reason}<br><br><span style="color:#ff1493; font-size:28px; font-weight:900;">ทำได้ทั้งหมด: ${score} คะแนน</span>`;
            document.querySelector('.overlay-title').innerText = 'GAME OVER 🌸';
            document.getElementById('startBtn').innerText = 'ลองใหม่อีกครั้ง ✨';
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
