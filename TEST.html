<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CYBER MATH RACER v0.3t</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #030308;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🌌 BACKGROUND SPEED & MOTION BLUR CANVAS */
        #bgCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            filter: blur(6px) contrast(150%);
            opacity: 0.75;
        }

        /* 🖼️ MAIN CYBER CONTAINER */
        .game-wrapper {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(16px) brightness(0.8);
            background: rgba(5, 5, 12, 0.4);
            border: 2px solid rgba(255, 0, 85, 0.3);
            box-shadow: inset 0 0 100px rgba(255, 0, 85, 0.2);
        }

        /* HEADER & TIMER */
        .header-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 25, 0.8);
            border: 2px solid #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            border-radius: 12px;
            padding: 12px 24px;
        }
        .score-box {
            font-size: 24px;
            font-weight: 900;
            color: #ffe600;
            text-shadow: 0 0 10px #ffe600;
        }
        .timer-box {
            font-size: 28px;
            font-weight: 900;
            color: #ff0055;
            text-shadow: 0 0 12px #ff0055;
        }

        /* TIMER BAR */
        .timer-bar-container {
            width: 100%;
            max-width: 800px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 242, 254, 0.3);
        }
        .timer-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00f2fe, #ff0055);
            box-shadow: 0 0 15px #ff0055;
            transition: width 0.1s linear;
        }

        /* ❓ QUESTION CARD */
        .question-card {
            width: 100%;
            max-width: 800px;
            flex: 1;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 20, 0.7);
            border: 3px solid #ff0055;
            box-shadow: 0 0 35px rgba(255, 0, 85, 0.5), inset 0 0 20px rgba(0, 242, 254, 0.2);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .question-text {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 900;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 20px #00f2fe, 0 0 40px #ff0055;
        }

        /* 🔘 ANSWERS GRID */
        .answers-grid {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 10px;
        }
        .btn-answer {
            background: rgba(20, 20, 35, 0.85);
            border: 2px solid #00f2fe;
            border-radius: 14px;
            color: #fff;
            font-size: clamp(22px, 4vw, 36px);
            font-weight: 800;
            padding: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
            text-shadow: 0 0 10px #00f2fe;
        }
        .btn-answer:hover, .btn-answer:active {
            background: #00f2fe;
            color: #000;
            box-shadow: 0 0 30px #00f2fe;
            transform: scale(1.03);
            text-shadow: none;
        }

        /* 📌 OVERLAY SCREENS (START / GAMEOVER) */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(3, 3, 10, 0.92);
            backdrop-filter: blur(25px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .overlay-title {
            font-size: clamp(36px, 8vw, 72px);
            font-weight: 900;
            color: #ff0055;
            text-shadow: 0 0 30px #ff0055, 0 0 60px #ff0055;
            margin-bottom: 10px;
        }
        .overlay-desc {
            font-size: 20px;
            color: #a6adc8;
            margin-bottom: 30px;
        }
        .btn-start {
            background: linear-gradient(135deg, #ff0055, #7928ca);
            border: 2px solid #ffffff;
            border-radius: 50px;
            color: #fff;
            font-size: 28px;
            font-weight: 900;
            padding: 16px 48px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.8);
            transition: all 0.2s;
        }
        .btn-start:hover {
            transform: scale(1.08);
            box-shadow: 0 0 50px rgba(255, 0, 85, 1);
        }

        /* 🏷️ FOOTER CREDIT (ONLY ONE PLACE) */
        .credit-footer {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Motion Blur Canvas -->
    <canvas id="bgCanvas"></canvas>

    <!-- Main Game UI -->
    <div class="game-wrapper">
        <div style="width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center;">
            <div class="header-bar">
                <div class="score-box" id="scoreDisplay">SCORE: 0</div>
                <div class="timer-box" id="timerDisplay">30.0s</div>
            </div>
            <div class="timer-bar-container">
                <div class="timer-bar-fill" id="timerBar"></div>
            </div>
        </div>

        <div class="question-card">
            <div class="question-text" id="questionDisplay">READY?</div>
        </div>

        <div class="answers-grid" id="answersGrid">
            <button class="btn-answer">-</button>
            <button class="btn-answer">-</button>
            <button class="btn-answer">-</button>
            <button class="btn-answer">-</button>
        </div>

        <!-- Single Credit Tag -->
        <div class="credit-footer">By Shogun v0.3t</div>
    </div>

    <!-- Start / Game Over Overlay -->
    <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlayTitle">CYBER MATH RACER</div>
        <div class="overlay-desc" id="overlayDesc">ตอบคำถามคณิต ม.ต้น | ข้อละ 30 วินาที | ตอบผิดกดเริ่มใหม่</div>
        <button class="btn-start" id="startBtn" onclick="startGame()">ลุยเลย!</button>
    </div>

    <script>
        // ==========================================
        // 🔊 SOUND ENGINE (Web Audio API)
        // ==========================================
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.15);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                }
            } catch(e) {}
        }

        // ==========================================
        // 🌌 MOTION BLUR CANVAS BACKGROUND
        // ==========================================
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let lines = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            lines = [];
            for(let i=0; i<60; i++) {
                lines.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 15 + 10,
                    length: Math.random() * 80 + 40,
                    color: Math.random() > 0.5 ? '#ff0055' : '#00f2fe'
                });
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function renderBG() {
            ctx.fillStyle = 'rgba(3, 3, 8, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            lines.forEach(l => {
                ctx.beginPath();
                ctx.moveTo(l.x, l.y);
                ctx.lineTo(l.x, l.y + l.length);
                ctx.strokeStyle = l.color;
                ctx.lineWidth = 3;
                ctx.stroke();

                l.y += l.speed;
                if (l.y > canvas.height) {
                    l.y = -l.length;
                    l.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(renderBG);
        }
        renderBG();

        // ==========================================
        // 🧠 MATH GENERATOR (ระดับ ม.ต้น)
        // ==========================================
        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateMathQuestion() {
            const types = ['arithmetic', 'signed', 'combined', 'algebra', 'exponent'];
            const type = types[Math.floor(Math.random() * types.length)];
            let question = '', answer = 0;

            if (type === 'arithmetic') {
                const op = ['+', '-', '*', '/'][Math.floor(Math.random() * 4)];
                if (op === '+') {
                    let a = randInt(35, 180), b = randInt(25, 150);
                    question = `${a} + ${b}`; answer = a + b;
                } else if (op === '-') {
                    let a = randInt(60, 250), b = randInt(35, 180);
                    question = `${a} - ${b}`; answer = a - b;
                } else if (op === '*') {
                    let a = randInt(8, 19), b = randInt(7, 16);
                    question = `${a} × ${b}`; answer = a * b;
                } else {
                    let b = randInt(6, 18), ans = randInt(6, 25);
                    let a = b * ans;
                    question = `${a} ÷ ${b}`; answer = ans;
                }
            } else if (type === 'signed') {
                // เลขติดลบ ม.ต้น
                const op = ['+', '-', '*'][Math.floor(Math.random() * 3)];
                let a = randInt(-25, 25); if (a === 0) a = 7;
                let b = randInt(-25, 25); if (b === 0) b = -5;
                if (op === '+') { question = `(${a}) + (${b})`; answer = a + b; }
                else if (op === '-') { question = `(${a}) - (${b})`; answer = a - b; }
                else { question = `(${a}) × (${b})`; answer = a * b; }
            } else if (type === 'combined') {
                // บวกลบคูณหารระคน
                let a = randInt(6, 14), b = randInt(5, 12), c = randInt(15, 60);
                if (Math.random() > 0.5) {
                    question = `(${a} × ${b}) - ${c}`;
                    answer = (a * b) - c;
                } else {
                    question = `${c} + (${a} × ${b})`;
                    answer = c + (a * b);
                }
            } else if (type === 'algebra') {
                // สมการเชิงเส้นตัวแปรเดียว
                let x = randInt(-12, 18); if (x === 0) x = 4;
                let a = randInt(2, 7);
                let b = randInt(3, 25);
                let res = a * x + b;
                question = `ถ้า ${a}x + ${b} = ${res} แล้ว x = ?`;
                answer = x;
            } else if (type === 'exponent') {
                // เลขยกกำลัง ม.ต้น
                let base = randInt(9, 16);
                let sub = randInt(15, 60);
                question = `${base}² - ${sub}`;
                answer = (base * base) - sub;
            }

            // ตัวเลือก 4 ข้อ
            let choices = [answer];
            while (choices.length < 4) {
                let offset = randInt(1, 6) * (Math.random() < 0.5 ? 1 : -1);
                let wrong = answer + offset;
                if (!choices.includes(wrong)) choices.push(wrong);
            }
            choices.sort(() => Math.random() - 0.5);

            return { question, answer, choices };
        }

        // ==========================================
        // 🎮 GAME LOGIC
        // ==========================================
        let score = 0;
        let currentAnswer = 0;
        let timer = 30.0;
        let timerInterval = null;
        let isPlaying = false;

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            score = 0;
            isPlaying = true;
            document.getElementById('scoreDisplay').innerText = `SCORE: ${score}`;
            nextQuestion();
        }

        function nextQuestion() {
            if (!isPlaying) return;

            const q = generateMathQuestion();
            currentAnswer = q.answer;
            document.getElementById('questionDisplay').innerText = q.question;

            const buttons = document.querySelectorAll('.btn-answer');
            buttons.forEach((btn, idx) => {
                btn.innerText = q.choices[idx];
                btn.onclick = () => checkAnswer(q.choices[idx]);
            });

            // Reset 30s Timer
            clearInterval(timerInterval);
            timer = 30.0;
            updateTimerUI();

            const startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timer = Math.max(0, 30.0 - elapsed);
                updateTimerUI();

                if (timer <= 0) {
                    gameOver('หมดเวลา 30 วินาที!');
                }
            }, 50);
        }

        function updateTimerUI() {
            document.getElementById('timerDisplay').innerText = `${timer.toFixed(1)}s`;
            const percent = (timer / 30.0) * 100;
            document.getElementById('timerBar').style.width = `${percent}%`;
        }

        function checkAnswer(selected) {
            if (!isPlaying) return;

            if (selected === currentAnswer) {
                playSound('correct');
                score += 1;
                document.getElementById('scoreDisplay').innerText = `SCORE: ${score}`;
                nextQuestion();
            } else {
                gameOver(`ตอบผิด! คำตอบที่ถูกต้องคือ ${currentAnswer}`);
            }
        }

        function gameOver(reason) {
            isPlaying = false;
            clearInterval(timerInterval);
            playSound('wrong');

            document.getElementById('overlayTitle').innerText = 'GAME OVER';
            document.getElementById('overlayDesc').innerHTML = `${reason}<br><br><span style="color:#ffe600; font-size:28px; font-weight:900;">คะแนนรวม: ${score} แต้ม</span>`;
            document.getElementById('startBtn').innerText = 'เริ่มใหม่';
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
