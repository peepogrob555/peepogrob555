<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SAKURA MATH PRINCESS v0.5t (FIXED EDITION)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800;900&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ffeef2 0%, #ffc3a0 40%, #ffa6c9 70%, #ffdde1 100%);
            font-family: 'Kanit', sans-serif;
            color: #4a2e35;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🌸 SAKURA & PARTICLE CANVAS */
        #sakuraCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* 🖕 TROLL SAKURA ITEM STYLES */
        .troll-flower {
            position: absolute;
            z-index: 80;
            cursor: pointer;
            user-select: none;
            top: -60px;
            will-change: transform, top;
            filter: drop-shadow(0 4px 10px rgba(255, 105, 180, 0.4));
            animation: trollFall linear forwards;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes trollFall {
            0% { top: -60px; transform: rotate(0deg); }
            100% { top: 105vh; transform: rotate(360deg); }
        }

        /* 🔥 MEME 67 POP-UP & SCREEN SHAKE ANIMATIONS */
        .pop-67-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 999;
            font-size: clamp(90px, 25vw, 220px);
            font-weight: 900;
            color: #ff0055;
            text-shadow: 
                0 0 20px #ff0055,
                0 0 40px #ff0055,
                6px 6px 0px #ffffff,
                -6px -6px 0px #000000;
            pointer-events: none;
            animation: pop67Anim 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes pop67Anim {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-25deg); opacity: 0; }
            25% { transform: translate(-50%, -50%) scale(1.5) rotate(12deg); opacity: 1; }
            70% { transform: translate(-50%, -50%) scale(1.2) rotate(-8deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2.2) rotate(20deg); opacity: 0; }
        }

        .shake-67-active {
            animation: screenShake67 0.08s infinite alternate !important;
        }
        @keyframes screenShake67 {
            0% { transform: translate(-18px, 12px) rotate(-6deg); filter: hue-rotate(90deg); }
            50% { transform: translate(18px, -15px) rotate(6deg); filter: hue-rotate(180deg); }
            100% { transform: translate(-12px, -8px) rotate(-4deg); filter: hue-rotate(270deg); }
        }

        /* 💖 MAIN GAME CONTAINER */
        .game-wrapper {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            backdrop-filter: blur(14px) brightness(1.02);
            background: rgba(255, 240, 245, 0.4);
            border: 4px solid rgba(255, 183, 197, 0.6);
            box-shadow: inset 0 0 80px rgba(255, 105, 180, 0.15);
            transition: transform 0.1s ease;
        }

        /* 👑 HEADER BAR (FIXED NO OVERFLOW) */
        .header-bar {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.88);
            border: 3px solid #ff85a2;
            box-shadow: 0 10px 30px rgba(255, 133, 162, 0.35), inset 0 0 15px rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 6px 12px;
            gap: 4px;
            animation: floatHeader 4s ease-in-out infinite alternate;
        }
        @keyframes floatHeader {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-4px); }
        }

        .score-box {
            font-size: clamp(13px, 3.8vw, 20px);
            font-weight: 800;
            color: #ff3366;
            text-shadow: 1px 1px 0px #ffe6ed;
            display: flex;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
            justify-self: start;
        }

        .level-badge {
            font-size: clamp(10px, 3vw, 13px);
            font-weight: 800;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 20px;
            box-shadow: 0 4px 12px rgba(255, 117, 140, 0.4);
            letter-spacing: 0.2px;
            white-space: nowrap;
            text-align: center;
            justify-self: center;
        }

        .timer-box {
            font-size: clamp(15px, 4.2vw, 24px);
            font-weight: 900;
            color: #ff1493;
            text-shadow: 0 0 8px rgba(255, 20, 147, 0.3);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            justify-self: end;
        }

        .timer-bar-container {
            width: 100%;
            max-width: 800px;
            height: 12px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            margin-top: 8px;
            overflow: hidden;
            border: 2.5px solid #ffb7c5;
            box-shadow: 0 4px 10px rgba(255, 183, 197, 0.3);
        }
        .timer-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff85a2, #ff3366, #ff1493);
            border-radius: 10px;
            transition: width 0.1s linear;
            box-shadow: 0 0 12px #ff3366;
        }

        /* 🌸 QUESTION CARD */
        .question-card {
            width: 100%;
            max-width: 800px;
            flex: 1;
            margin: 12px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.92);
            border: 4px solid #ff69b4;
            box-shadow: 0 20px 45px rgba(255, 105, 180, 0.35), inset 0 0 25px rgba(255, 255, 255, 0.8);
            border-radius: 38px;
            padding: 16px;
            text-align: center;
            position: relative;
        }
        .question-card::before {
            content: '🌸 ✨ 🌸';
            position: absolute;
            top: -16px;
            background: #ffffff;
            padding: 2px 18px;
            border-radius: 15px;
            border: 2px solid #ff69b4;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(255, 105, 180, 0.2);
        }
        .question-text {
            font-size: clamp(42px, 10vw, 80px);
            font-weight: 900;
            color: #3a1c24;
            text-shadow: 3px 4px 0px #ffd1dc;
            line-height: 1.2;
            word-break: break-word;
        }

        /* 🍧 ANSWERS GRID */
        .answers-grid {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 8px;
        }
        .btn-answer {
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #ff85a2;
            border-radius: 26px;
            color: #4a2e35;
            font-size: clamp(22px, 5vw, 38px);
            font-weight: 900;
            padding: 16px;
            cursor: pointer;
            transition: all 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 22px rgba(255, 133, 162, 0.28);
            position: relative;
            overflow: hidden;
        }
        .btn-answer:hover, .btn-answer:active {
            background: linear-gradient(135deg, #ff85a2, #ff3366);
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 15px 30px rgba(255, 51, 102, 0.5);
            transform: translateY(-5px) scale(1.03);
        }

        /* 🌸 OVERLAY SCREENS & LEVEL SELECTOR */
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(255, 240, 245, 0.96);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .overlay-title {
            font-size: clamp(34px, 7vw, 64px);
            font-weight: 900;
            color: #ff1493;
            text-shadow: 3px 3px 0px #ffe6ed, 0 0 25px rgba(255, 20, 147, 0.3);
            margin-bottom: 4px;
        }
        .overlay-subtitle {
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            padding: 6px 20px;
            border-radius: 25px;
            box-shadow: 0 6px 18px rgba(255, 117, 140, 0.35);
            margin-bottom: 18px;
        }

        .level-select-title {
            font-size: 16px;
            font-weight: 800;
            color: #7a4652;
            margin-bottom: 10px;
        }
        .level-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 22px;
        }
        .btn-level {
            background: #ffffff;
            border: 2.5px solid #ffb7c5;
            border-radius: 18px;
            padding: 10px 14px;
            font-family: 'Kanit', sans-serif;
            font-size: 16px;
            font-weight: 800;
            color: #5c3a42;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 183, 197, 0.3);
        }
        .btn-level.active {
            background: linear-gradient(135deg, #ff1493, #ff65a3);
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.4);
            transform: scale(1.04);
        }

        .overlay-desc {
            font-size: 17px;
            color: #5c3a42;
            margin-bottom: 24px;
            line-height: 1.6;
            font-weight: 600;
        }
        .btn-start {
            background: linear-gradient(135deg, #ff1493, #ff65a3);
            border: 4px solid #ffffff;
            border-radius: 50px;
            color: #fff;
            font-size: 26px;
            font-weight: 900;
            padding: 16px 50px;
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(255, 20, 147, 0.5);
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-start:hover {
            transform: scale(1.08);
            box-shadow: 0 18px 45px rgba(255, 20, 147, 0.7);
        }

        .credit-footer {
            font-size: 13px;
            font-weight: 800;
            color: #a36b77;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 14px;
            border-radius: 15px;
            border: 1px solid rgba(255, 183, 197, 0.5);
        }
    </style>
</head>
<body>

    <!-- Canvas -->
    <canvas id="sakuraCanvas"></canvas>

    <!-- Main Game UI -->
    <div class="game-wrapper" id="gameWrapper">
        <div style="width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center;">
            <div class="header-bar">
                <div class="score-box" id="scoreDisplay">🌸 คะแนน: 0</div>
                <div class="level-badge" id="levelBadgeDisplay">ระดับ ม.ต้น</div>
                <div class="timer-box" id="timerDisplay">45.0s</div>
            </div>
            <div class="timer-bar-container">
                <div class="timer-bar-fill" id="timerBar"></div>
            </div>
        </div>

        <div class="question-card">
            <div class="question-text" id="questionDisplay">พร้อมท้าทายความเร็วหรือยังคะ? 🌸</div>
        </div>

        <div class="answers-grid" id="answersGrid">
            <button class="btn-answer">🌸</button>
            <button class="btn-answer">🎀</button>
            <button class="btn-answer">✨</button>
            <button class="btn-answer">🍡</button>
        </div>

        <div class="credit-footer">By Shogun v0.5t (SIX SEVEN 67)</div>
    </div>

    <!-- Start / Game Over Overlay -->
    <div class="overlay" id="overlay">
        <div class="overlay-title">SAKURA MATH 🌸</div>
        <div class="overlay-subtitle">เกมคณิตศาสตร์ซากุระ</div>

        <div class="level-select-title">🎯 เลือกระดับชั้นเรียน:</div>
        <div class="level-grid">
            <button class="btn-level" onclick="selectLevel('ประถมต้น', this)">ประถมต้น (ป.1-3)</button>
            <button class="btn-level" onclick="selectLevel('ประถมปลาย', this)">ประถมปลาย (ป.4-6)</button>
            <button class="btn-level active" onclick="selectLevel('ม.ต้น', this)">ม.ต้น (ม.1-3)</button>
            <button class="btn-level" onclick="selectLevel('ม.ปลาย', this)">ม.ปลาย (ม.4-6)</button>
        </div>

        <div class="overlay-desc" id="overlayDesc">
            ⏱️ เวลาคิดข้อละ <b>45 วินาที</b> | ตอบผิด/หมดเวลา เริ่มใหม่ทันที!
        </div>
        <button class="btn-start" id="startBtn" onclick="startGame()">พร้อมแล้ว ลุยเลย! ✨</button>
    </div>

    <script>
        // ==========================================
        // 🔊 AUDIO ENGINE
        // ==========================================
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(659.25, now);
                    osc.frequency.setValueAtTime(987.77, now + 0.1);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, now);
                    osc.frequency.exponentialRampToValueAtTime(110, now + 0.25);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                } else if (type === 'meme67') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(800, now + 0.4);
                    osc.frequency.linearRampToValueAtTime(200, now + 0.8);
                    gain.gain.setValueAtTime(0.4, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
                    osc.start(now); osc.stop(now + 1.0);
                }
            } catch(e) {}
        }

        // ==========================================
        // 🌸 SAKURA CANVAS & PARTICLES
        // ==========================================
        const canvas = document.getElementById('sakuraCanvas');
        const ctx = canvas.getContext('2d');
        let petals = [];
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            petals = [];
            for (let i = 0; i < 45; i++) {
                petals.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 10 + 8,
                    speedY: Math.random() * 1.5 + 0.8,
                    speedX: Math.random() * 1 - 0.5,
                    angle: Math.random() * 360,
                    spin: Math.random() * 2 - 1,
                    swing: Math.random() * Math.PI * 2
                });
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawSakuraPetal(x, y, size, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate((angle * Math.PI) / 180);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-size, -size * 1.5, -size * 1.5, size / 2, 0, size * 1.5);
            ctx.bezierCurveTo(size * 1.5, size / 2, size, -size * 1.5, 0, 0);
            ctx.fillStyle = '#ffb7c5';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ff69b4';
            ctx.fill();
            ctx.restore();
        }

        function triggerBurst(x, y) {
            const colors = ['#ff1493', '#ff69b4', '#ffb7c5', '#ffffff', '#ffe6ed'];
            for (let i = 0; i < 35; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 3;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1, rotation: Math.random() * 360
                });
            }
        }

        function renderCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            petals.forEach(p => {
                p.swing += 0.02;
                p.x += Math.sin(p.swing) * 1.2 + p.speedX;
                p.y += p.speedY;
                p.angle += p.spin;
                drawSakuraPetal(p.x, p.y, p.size, p.angle);
                if (p.y > canvas.height + 20) {
                    p.y = -20; p.x = Math.random() * canvas.width;
                }
            });

            for (let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i];
                pt.x += pt.vx; pt.y += pt.vy;
                pt.vy += 0.15; pt.alpha -= 0.025;
                ctx.save();
                ctx.globalAlpha = Math.max(0, pt.alpha);
                drawSakuraPetal(pt.x, pt.y, pt.size, pt.rotation);
                ctx.restore();
                if (pt.alpha <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(renderCanvas);
        }
        renderCanvas();

        // ==========================================
        // 🖕 TROLL SAKURA SPAWNER (EVERY 15 SECONDS)
        // ==========================================
        let trollInterval = null;

        function startTrollLoop() {
            clearInterval(trollInterval);
            trollInterval = setInterval(() => {
                if (isPlaying) {
                    spawnTrollSakuraGroup();
                }
            }, 15000);
        }

        function spawnTrollSakuraGroup() {
            const count = randInt(2, 5);
            for (let i = 0; i < count; i++) {
                setTimeout(() => { if (isPlaying) createTrollItem(); }, i * randInt(250, 600));
            }
        }

        function createTrollItem() {
            const el = document.createElement('div');
            el.className = 'troll-flower';
            el.innerText = '🌸';
            const size = randInt(28, 54);
            el.style.fontSize = `${size}px`;
            const startX = randInt(20, window.innerWidth - 70);
            el.style.left = `${startX}px`;
            const fallDuration = randInt(4000, 8000) / 1000;
            el.style.animationDuration = `${fallDuration}s`;

            let isPopped = false;
            el.onclick = (e) => {
                e.stopPropagation();
                if (isPopped) return;
                isPopped = true;
                el.innerText = '🖕';
                playSound('wrong');
                el.style.animationPlayState = 'paused';
                el.style.transform = `scale(1.6) rotate(${randInt(-25, 25)}deg)`;
                el.style.filter = 'drop-shadow(0 6px 15px rgba(255, 0, 85, 0.8))';

                setTimeout(() => {
                    el.style.opacity = '0';
                    el.style.transform += ' scale(0.3)';
                    setTimeout(() => el.remove(), 300);
                }, 800);
            };

            document.body.appendChild(el);
            setTimeout(() => { if (el.parentNode && !isPopped) el.remove(); }, fallDuration * 1000 + 500);
        }

        // ==========================================
        // 🔥 MEME 67 TRIGGER SYSTEM (SIX SEVEN)
        // ==========================================
        function trigger67MemeEffect() {
            playSound('meme67');

            const popEl = document.createElement('div');
            popEl.className = 'pop-67-overlay';
            popEl.innerText = '67';
            document.body.appendChild(popEl);

            const wrapper = document.getElementById('gameWrapper');
            wrapper.classList.add('shake-67-active');

            setTimeout(() => {
                wrapper.classList.remove('shake-67-active');
            }, 1200);

            setTimeout(() => {
                popEl.remove();
            }, 1300);
        }

        // ==========================================
        // 🎯 LEVEL SYSTEM & MATH GENERATOR (FIXED)
        // ==========================================
        let selectedLevel = 'ม.ต้น';

        function selectLevel(lvl, btn) {
            selectedLevel = lvl;
            document.querySelectorAll('.btn-level').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('levelBadgeDisplay').innerText = `ระดับ ${selectedLevel}`;
        }

        function randInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateMathQuestion() {
            let question = '', answer = 0;

            if (selectedLevel === 'ประถมต้น') {
                const type = randInt(1, 3);
                if (type === 1) {
                    let a = randInt(5, 50), b = randInt(5, 50);
                    question = `${a} + ${b}`; answer = a + b;
                } else if (type === 2) {
                    let a = randInt(20, 99), b = randInt(5, a);
                    question = `${a} - ${b}`; answer = a - b;
                } else {
                    let a = randInt(2, 9), b = randInt(2, 9);
                    question = `${a} × ${b}`; answer = a * b;
                }
            } else if (selectedLevel === 'ประถมปลาย') {
                const type = randInt(1, 3);
                if (type === 1) {
                    let a = randInt(12, 45), b = randInt(6, 15);
                    question = `${a} × ${b}`; answer = a * b;
                } else if (type === 2) {
                    let b = randInt(4, 15), ans = randInt(8, 25);
                    let a = b * ans;
                    question = `${a} ÷ ${b}`; answer = ans;
                } else {
                    let a = randInt(10, 40), b = randInt(2, 8), c = randInt(5, 30);
                    question = `(${a} × ${b}) - ${c}`; answer = (a * b) - c;
                }
            } else if (selectedLevel === 'ม.ต้น') {
                const type = randInt(1, 3);
                if (type === 1) {
                    let a = randInt(-20, 20); if (a === 0) a = 7;
                    let b = randInt(-20, 20); if (b === 0) b = -5;
                    question = `(${a}) - (${b})`; answer = a - b;
                } else if (type === 2) {
                    let x = randInt(-10, 15); if (x === 0) x = 4;
                    let a = randInt(2, 6), b = randInt(2, 20);
                    let res = a * x + b;
                    question = `หาค่า x: ${a}x + ${b} = ${res}`; answer = x;
                } else {
                    let base = randInt(8, 15), sub = randInt(10, 50);
                    question = `${base}² - ${sub}`; answer = (base * base) - sub;
                }
            } else {
                // ระดับ ม.ปลาย
                const type = randInt(1, 4);
                if (type === 1) {
                    const trigList = [
                        { q: 'sin(30°)', a: 0.5 }, { q: 'cos(60°)', a: 0.5 },
                        { q: 'tan(45°)', a: 1 }, { q: 'sin(90°)', a: 1 },
                        { q: 'cos(0°)', a: 1 }, { q: 'sin(0°)', a: 0 }
                    ];
                    const item = trigList[randInt(0, trigList.length - 1)];
                    question = `ค่าของ ${item.q}`; answer = item.a;
                } else if (type === 2) {
                    const logList = [
                        { q: 'log₂(8)', a: 3 }, { q: 'log₃(81)', a: 4 },
                        { q: 'log₅(25)', a: 2 }, { q: 'log₁₀(1000)', a: 3 }
                    ];
                    const item = logList[randInt(0, logList.length - 1)];
                    question = `ค่าของ ${item.q}`; answer = item.a;
                } else if (type === 3) {
                    let n = randInt(3, 5);
                    let fact = 1; for (let i = 1; i <= n; i++) fact *= i;
                    let sub = randInt(2, 10);
                    question = `${n}! - ${sub}`; answer = fact - sub;
                } else {
                    let a = randInt(2, 4), b = randInt(3, 5);
                    let c = randInt(2, 3), d = randInt(2, 4);
                    question = `(${a}<sup>${b}</sup>) - (${c}<sup>${d}</sup>)`;
                    answer = Math.pow(a, b) - Math.pow(c, d);
                }
            }

            let choices = [answer];
            let attempts = 0;
            while (choices.length < 4 && attempts < 100) {
                attempts++;
                let isFloat = !Number.isInteger(answer); // แก้ไขจาก Number.isFloat ที่ไม่มีใน JS
                let offset = (selectedLevel === 'ม.ปลาย' && isFloat) 
                    ? (Math.random() < 0.5 ? 0.5 : -0.5) 
                    : randInt(1, 6) * (Math.random() < 0.5 ? 1 : -1);
                
                let wrong = answer + offset;
                if (isFloat) wrong = parseFloat(wrong.toFixed(2));
                if (!choices.includes(wrong)) choices.push(wrong);
            }
            choices.sort(() => Math.random() - 0.5);

            return { question, answer, choices };
        }

        // ==========================================
        // 🎮 GAME LOGIC (45 Seconds)
        // ==========================================
        let score = 0;
        let currentAnswer = 0;
        const maxTime = 45.0;
        let timer = maxTime;
        let timerInterval = null;
        let isPlaying = false;

        function startGame() {
            initAudio();
            document.getElementById('overlay').style.display = 'none';
            score = 0;
            isPlaying = true;
            document.getElementById('scoreDisplay').innerText = `🌸 คะแนน: ${score}`;
            document.getElementById('levelBadgeDisplay').innerText = `ระดับ ${selectedLevel}`;
            
            startTrollLoop();
            nextQuestion();
        }

        function nextQuestion() {
            if (!isPlaying) return;

            const q = generateMathQuestion();
            currentAnswer = q.answer;
            document.getElementById('questionDisplay').innerHTML = q.question;

            const buttons = document.querySelectorAll('.btn-answer');
            buttons.forEach((btn, idx) => {
                btn.innerHTML = q.choices[idx];
                btn.onclick = (e) => checkAnswer(q.choices[idx], e);
            });

            clearInterval(timerInterval);
            timer = maxTime;
            updateTimerUI();

            const startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timer = Math.max(0, maxTime - elapsed);
                updateTimerUI();

                if (timer <= 0) {
                    gameOver('หมดเวลา 45 วินาทีแล้วน้า~ 🌸');
                }
            }, 50);
        }

        function updateTimerUI() {
            document.getElementById('timerDisplay').innerText = `${timer.toFixed(1)}s`;
            const percent = (timer / maxTime) * 100;
            document.getElementById('timerBar').style.width = `${percent}%`;
        }

        function checkAnswer(selected, event) {
            if (!isPlaying) return;

            if (selected === currentAnswer) {
                score += 1;
                document.getElementById('scoreDisplay').innerText = `🌸 คะแนน: ${score}`;
                
                if (score === 67) {
                    trigger67MemeEffect();
                } else {
                    playSound('correct');
                }

                if (event) {
                    const rect = event.target.getBoundingClientRect();
                    triggerBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);
                }

                nextQuestion();
            } else {
                gameOver(`ตอบผิดน้า~ คำตอบที่ถูกคือ ${currentAnswer}`);
            }
        }

        function gameOver(reason) {
            isPlaying = false;
            clearInterval(timerInterval);
            clearInterval(trollInterval);

            playSound('wrong');

            document.querySelectorAll('.troll-flower').forEach(el => el.remove());

            document.getElementById('overlayDesc').innerHTML = `${reason}<br><br><span style="color:#ff1493; font-size:26px; font-weight:900;">[ ${selectedLevel} ] ทำได้ทั้งหมด: ${score} คะแนน</span>`;
            document.querySelector('.overlay-title').innerText = 'GAME OVER 🌸';
            document.getElementById('startBtn').innerText = 'ลองใหม่อีกครั้ง ✨';
            document.getElementById('overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
